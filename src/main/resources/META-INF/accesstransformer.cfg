# Deadeye time-flow control.
# The server tick loop is paced by MinecraftServer.nextTickTime; pushing it
# forward stretches the tick interval, slowing the whole server.
public net.minecraft.server.MinecraftServer f_129726_ # nextTickTime
# The client tick loop is paced by Minecraft.timer (Timer.msPerTick).
public net.minecraft.client.Minecraft f_90991_ # timer
public-f net.minecraft.client.Timer f_92521_ # msPerTick
